  <script type="module">
  // ===== 5. 调度层 =====
  import * as THREE from 'three';

  class Stage {
    constructor(containerId) {
      this._container = document.getElementById(containerId);
      this._width = window.innerWidth;
      this._height = window.innerHeight;

      this.renderer = new THREE.WebGLRenderer({ alpha: true, antialias: true });
      this.renderer.setSize(this._width, this._height);
      this.renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
      this.renderer.outputColorSpace = THREE.SRGBColorSpace;
      this.renderer.toneMapping = THREE.ACESFilmicToneMapping;
      this.renderer.toneMappingExposure = 1.2;
      this._container.appendChild(this.renderer.domElement);

      this.scene = new THREE.Scene();
      this.scene.background = new THREE.Color('#000000');

      const ambientLight = new THREE.AmbientLight(0x222233, 1.5);
      this.scene.add(ambientLight);
      const pointLight = new THREE.PointLight(0xD4A843, 30, 30);
      pointLight.position.set(0, 5, 10);
      this.scene.add(pointLight);
      const pointLight2 = new THREE.PointLight(0x886622, 15, 25);
      pointLight2.position.set(-5, -2, 5);
      this.scene.add(pointLight2);

      this.camera = new THREE.PerspectiveCamera(45, this._width / this._height, 0.1, 100);
      this.camera.position.set(0, 0, 20);

      this.clock = new THREE.Clock();
      this._events = {};
      this._sceneIndex = 0;

      this._onResize = () => {
        this._width = window.innerWidth;
        this._height = window.innerHeight;
        this.renderer.setSize(this._width, this._height);
        this.camera.aspect = this._width / this._height;
        this.camera.updateProjectionMatrix();
        this.emit('resize', { width: this._width, height: this._height });
      };
      window.addEventListener('resize', this._onResize);
    }

    on(event, fn) { (this._events[event] ||= []).push(fn); }
    emit(event, data) { (this._events[event] || []).forEach(fn => fn(data)); }

    get currentSceneIndex() { return this._sceneIndex; }
  }

  // ===== MouseManager =====
  class MouseManager {
    constructor(canvas) {
      this._canvas = canvas;
      this.normalized = { x: 0, y: 0 };
      this.screen = { x: 0, y: 0 };
      this.velocity = { x: 0, y: 0 };
      this.ripple = { x: 0, y: 0, strength: 0 };
      this._prevX = 0;
      this._prevY = 0;

      this._onMove = (e) => {
        this.screen.x = e.clientX;
        this.screen.y = e.clientY;
        this.normalized.x = (e.clientX / window.innerWidth) * 2 - 1;
        this.normalized.y = -(e.clientY / window.innerHeight) * 2 + 1;
        this.ripple.x = this.normalized.x;
        this.ripple.y = this.normalized.y;
      };

      this._onLeave = () => {
        this.ripple.strength = 0;
      };

      window.addEventListener('mousemove', this._onMove, { passive: true });
      window.addEventListener('mouseleave', this._onLeave);
    }

    update() {
      this.velocity.x = this.normalized.x - this._prevX;
      this.velocity.y = this.normalized.y - this._prevY;
      this._prevX = this.normalized.x;
      this._prevY = this.normalized.y;
      const speed = Math.sqrt(this.velocity.x ** 2 + this.velocity.y ** 2);
      this.ripple.strength = Math.min(speed * 3, 1.0);
    }

    dispose() {
      window.removeEventListener('mousemove', this._onMove);
      window.removeEventListener('mouseleave', this._onLeave);
    }
  }

  // ===== CameraController =====
  class CameraController {
    constructor(camera) {
      this._camera = camera;
      this._keyframes = [];
      this._currentPos = new THREE.Vector3();
      this._currentLookAt = new THREE.Vector3();
      this._currentFov = 45;
    }

    addKeyframe(progress, position, lookAt, fov = 45) {
      this._keyframes.push({
        progress: THREE.MathUtils.clamp(progress, 0, 1),
        position: position.clone(),
        lookAt: lookAt.clone(),
        fov
      });
      this._keyframes.sort((a, b) => a.progress - b.progress);
    }

    update(scrollProgress) {
      const t = THREE.MathUtils.clamp(scrollProgress, 0, 1);
      let prev = this._keyframes[0];
      let next = this._keyframes[this._keyframes.length - 1];
      for (let i = 0; i < this._keyframes.length - 1; i++) {
        if (t >= this._keyframes[i].progress && t <= this._keyframes[i + 1].progress) {
          prev = this._keyframes[i];
          next = this._keyframes[i + 1];
          break;
        }
      }
      const range = next.progress - prev.progress;
      const localT = range > 0 ? (t - prev.progress) / range : 0;
      const ease = localT < 0.5 ? 2 * localT * localT : 1 - Math.pow(-2 * localT + 2, 2) / 2;
      this._currentPos.lerpVectors(prev.position, next.position, ease);
      this._currentLookAt.lerpVectors(prev.lookAt, next.lookAt, ease);
      this._currentFov = THREE.MathUtils.lerp(prev.fov, next.fov, ease);
      this._camera.position.copy(this._currentPos);
      this._camera.lookAt(this._currentLookAt);
      this._camera.fov = this._currentFov;
      this._camera.updateProjectionMatrix();
    }

    getPosition() { return this._camera.position.clone(); }
    getTarget() { return this._currentLookAt.clone(); }
  }

  // ===== StarfieldBackground — 外部光源照亮固定粒子，非自发光 =====
  class StarfieldBackground {
    constructor(scene, count = 150000) {
      this._scene = scene;
      this._count = count;

      // ===== 聚类中心：粒子围绕这些点呈高斯分布 =====
      const clusters = [
        { x: 0, y: 0, z: 0, weight: 0.25, spread: 15 },
        { x: 0, y: 4, z: 0, weight: 0.20, spread: 10 },
        { x: 0, y: 7, z: 0, weight: 0.20, spread: 10 },
        { x: -4, y: 2, z: -2, weight: 0.15, spread: 12 },
        { x: 4, y: 5, z: -2, weight: 0.10, spread: 12 },
        { x: 0, y: -3, z: 0, weight: 0.10, spread: 18 },
      ];

      const positions = new Float32Array(count * 3);
      const sizes = new Float32Array(count);
      const worldPosStore = new Float32Array(count * 3); // 存世界坐标给光照计算

      // 高斯随机数生成器 (Box-Muller)
      function gaussRandom() {
        let u = 0, v = 0;
        while (u === 0) u = Math.random();
        while (v === 0) v = Math.random();
        return Math.sqrt(-2.0 * Math.log(u)) * Math.cos(2.0 * Math.PI * v);
      }

      for (let i = 0; i < count; i++) {
        // 按权重随机选一个聚类中心
        let r = Math.random();
        let c = clusters[0];
        let acc = 0;
        for (const cl of clusters) {
          acc += cl.weight;
          if (r <= acc) { c = cl; break; }
        }

        // 高斯偏移
        const ox = gaussRandom() * c.spread;
        const oy = gaussRandom() * c.spread;
        const oz = gaussRandom() * c.spread;

        const wx = c.x + ox;
        const wy = c.y + oy;
        const wz = c.z + oz;

        positions[i * 3] = wx;
        positions[i * 3 + 1] = wy;
        positions[i * 3 + 2] = wz;
        worldPosStore[i * 3] = wx;
        worldPosStore[i * 3 + 1] = wy;
        worldPosStore[i * 3 + 2] = wz;

        // ===== 粒子大小 = 基础值 + 小比例伪随机噪声 =====
        const distFromCenter = Math.sqrt(ox*ox + oy*oy + oz*oz);
        const baseSize = 0.08 - (distFromCenter / c.spread) * 0.05;
        const noiseSize = baseSize * (
          1.0 + Math.sin(wx * 7.31 + wz * 3.17) * 0.12
              + Math.cos(wy * 5.73 + wx * 2.91) * 0.10
              + Math.sin((wx + wy) * 4.19 + wz * 6.53) * 0.08
        );
        sizes[i] = Math.max(0.015, Math.min(0.18, noiseSize));
      }

      const geometry = new THREE.BufferGeometry();
      geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
      geometry.setAttribute('aSize', new THREE.BufferAttribute(sizes, 1));
      // 存世界坐标到 UV（不会被 group 旋转影响）
      geometry.setAttribute('aWorldPos', new THREE.BufferAttribute(worldPosStore, 3));

      // ===== Shader：外部光源照亮粒子，非自发光 =====
      const material = new THREE.ShaderMaterial({
        uniforms: {
          uPointScale: new THREE.Uniform(1.0),
          // 光源数据（位置 + 颜色）
          uLight1Pos: new THREE.Uniform(new THREE.Vector3(0, 5, 10)),
          uLight1Color: new THREE.Uniform(new THREE.Color('#D4A843')),
          uLight2Pos: new THREE.Uniform(new THREE.Vector3(-5, -2, 5)),
          uLight2Color: new THREE.Uniform(new THREE.Color('#B8942E')),
          uLight3Pos: new THREE.Uniform(new THREE.Vector3(0, 0, 8)),
          uLight3Color: new THREE.Uniform(new THREE.Color('#FFF8E7')),
          uCameraPos: new THREE.Uniform(new THREE.Vector3(0, 0, 8)),
        },
        vertexShader: `
          attribute float aSize;
          attribute vec3 aWorldPos;
          varying vec3 vWorldPos;
          varying float vSize;
          uniform float uPointScale;
          uniform vec3 uCameraPos;
          void main() {
            vec4 mvPosition = modelViewMatrix * vec4(position, 1.0);
            gl_PointSize = aSize * uPointScale * (300.0 / -mvPosition.z);
            gl_Position = projectionMatrix * mvPosition;
            vWorldPos = aWorldPos;
            vSize = aSize;
          }
        `,
        fragmentShader: `
          varying vec3 vWorldPos;
          varying float vSize;
          uniform vec3 uLight1Pos;
          uniform vec3 uLight1Color;
          uniform vec3 uLight2Pos;
          uniform vec3 uLight2Color;
          uniform vec3 uLight3Pos;
          uniform vec3 uLight3Color;
          uniform vec3 uCameraPos;

          void main() {
            // 圆形粒子蒙版
            float d = length(gl_PointCoord - 0.5) * 2.0;
            float alpha = 1.0 - smoothstep(0.2, 0.9, d);

            // === 光照计算：外部光源反光，非自发光 ===
            vec3 totalLight = vec3(0.0);

            // 光源1
            float d1 = length(vWorldPos - uLight1Pos);
            float att1 = 1.0 / (1.0 + d1 * d1 * 0.005);
            totalLight += uLight1Color * att1;

            // 光源2
            float d2 = length(vWorldPos - uLight2Pos);
            float att2 = 1.0 / (1.0 + d2 * d2 * 0.008);
            totalLight += uLight2Color * att2;

            // 光源3（摄像机位置的补光）
            float d3 = length(vWorldPos - uLight3Pos);
            float att3 = 1.0 / (1.0 + d3 * d3 * 0.003);
            totalLight += uLight3Color * att3 * 0.5;

            // === 摄像机距离色偏：近暖金，远冷蓝 ===
            float camDist = length(vWorldPos - uCameraPos);
            float warmth = exp(-camDist * 0.03);
            vec3 nearColor = vec3(1.0, 0.85, 0.6);
            vec3 farColor  = vec3(0.35, 0.45, 0.65);
            vec3 baseColor = mix(farColor, nearColor, warmth);

            // === 叠加高亮噪声炫光 ===
            float sparkle = 0.0;
            sparkle += sin(vWorldPos.x * 23.7 + vWorldPos.y * 17.3) * 0.15;
            sparkle += cos(vWorldPos.y * 31.1 + vWorldPos.z * 19.7) * 0.12;
            sparkle += sin(vWorldPos.z * 27.3 + vWorldPos.x * 21.1) * 0.10;
            sparkle = abs(sparkle);
            sparkle = pow(sparkle, 3.0) * 0.6; // 少数粒子高亮反光

            vec3 finalColor = baseColor * totalLight * (1.0 + sparkle);
            float finalAlpha = alpha * (0.35 + totalLight.r * 0.65);

            gl_FragColor = vec4(finalColor, finalAlpha);
          }
        `,
        transparent: true,
        depthWrite: false,
        blending: THREE.NormalBlending,
      });

      this._points = new THREE.Points(geometry, material);
      this._points.name = 'starfield';
      scene.add(this._points);
    }

    update(delta, cameraPos) {
      // 极慢的整体旋转（模拟星河流转）
      this._points.rotation.y += delta * 0.001;
      this._points.rotation.x += delta * 0.0005;
      // 更新摄像机位置给 shader
      if (cameraPos) {
        this._points.material.uniforms.uCameraPos.value.copy(cameraPos);
      }
    }

    dispose() {
      this._points.geometry.dispose();
      this._points.material.dispose();
      this._scene.remove(this._points);
    }
  }

  // ===== PostProcessing — render-to-texture with RGB shift + vignette =====
  class PostProcessing {
    constructor(renderer, scene, camera) {
      this._renderer = renderer;
      this._scene = scene;
      this._camera = camera;

      // Fullscreen quad scene for post-processing
      this._ppScene = new THREE.Scene();
      this._ppCamera = new THREE.OrthographicCamera(-1, 1, 1, -1, 0, 1);

      // Render targets
      const size = new THREE.Vector2();
      renderer.getSize(size);
      this._rtA = new THREE.WebGLRenderTarget(size.x, size.y, {
        minFilter: THREE.LinearFilter,
        magFilter: THREE.LinearFilter,
      });
      this._rtB = new THREE.WebGLRenderTarget(size.x, size.y, {
        minFilter: THREE.LinearFilter,
        magFilter: THREE.LinearFilter,
      });

      // RGB Shift + vignette shader
      const ppShader = {
        uniforms: {
          tDiffuse: new THREE.Uniform(null),
          uRGBStrength: new THREE.Uniform(0.0),
          uTime: new THREE.Uniform(0.0),
          uResolution: new THREE.Uniform(new THREE.Vector2(size.x, size.y)),
        },
        vertexShader: `
          varying vec2 vUv;
          void main() {
            vUv = uv;
            gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
          }
        `,
        fragmentShader: `
          uniform sampler2D tDiffuse;
          uniform float uRGBStrength;
          uniform float uTime;
          uniform vec2 uResolution;
          varying vec2 vUv;

          void main() {
            vec2 uv = vUv;
            float angle = uTime * 0.1;
            vec2 offset = uRGBStrength * 0.01 * vec2(cos(angle), sin(angle));
            float r = texture2D(tDiffuse, uv + offset).r;
            float g = texture2D(tDiffuse, uv).g;
            float b = texture2D(tDiffuse, uv - offset).b;
            float a = texture2D(tDiffuse, uv).a;

            // Vignette
            vec2 vuv = uv - 0.5;
            float vignette = 1.0 - dot(vuv, vuv) * 0.5;

            gl_FragColor = vec4(r, g, b, a) * vignette;
          }
        `,
      };

      this._ppMaterial = new THREE.ShaderMaterial(ppShader);
      const quadGeo = new THREE.PlaneGeometry(2, 2);
      this._ppQuad = new THREE.Mesh(quadGeo, this._ppMaterial);
      this._ppScene.add(this._ppQuad);

      this._rgbStrength = 0;
      this._bloomStrength = 0;

      // Resize handler
      this._onResize = () => {
        const s = new THREE.Vector2();
        renderer.getSize(s);
        this._rtA.setSize(s.x, s.y);
        this._rtB.setSize(s.x, s.y);
        this._ppMaterial.uniforms.uResolution.value.set(s.x, s.y);
      };
    }

    setRGBStrength(v) { this._rgbStrength = THREE.MathUtils.clamp(v, 0, 1); }
    setBloomStrength(v) { this._bloomStrength = THREE.MathUtils.clamp(v, 0, 2); }

    render(delta, scrollProgress, mousePos) {
      if (this._rgbStrength < 0.001) return; // Skip if no effect

      // Render scene to texture
      this._renderer.setRenderTarget(this._rtA);
      this._renderer.render(this._scene, this._camera);

      // Apply post-processing
      this._ppMaterial.uniforms.tDiffuse.value = this._rtA.texture;
      this._ppMaterial.uniforms.uRGBStrength.value = this._rgbStrength;
      this._ppMaterial.uniforms.uTime.value += delta;

      this._renderer.setRenderTarget(null);
      this._renderer.render(this._ppScene, this._ppCamera);
    }

    dispose() {
      this._rtA.dispose();
      this._rtB.dispose();
      this._ppMaterial.dispose();
      this._ppQuad.geometry.dispose();
    }
  }

  // ===== SynapseNetwork =====
  class SynapseNetwork {
    constructor(scene) {
      this._scene = scene;
      this._nodes = new Map();
      this._edges = [];
      this._group = new THREE.Group();
      this._group.name = 'synapseNetwork';
      scene.add(this._group);
    }

    addNode(id, position, options = {}) {
      const { radius = 0.3, isCore = false } = options;
      const colorHex = isCore ? '#D4A843' : '#B8942E';

      const geo = new THREE.SphereGeometry(radius, 32, 32);
      const mat = new THREE.MeshStandardMaterial({
        color: colorHex,
        roughness: 0.2,
        metalness: 0.9,
      });
      const mesh = new THREE.Mesh(geo, mat);
      mesh.position.copy(position);
      mesh.name = `node_${id}`;

      // Soft glow sprite — radial gradient, not fresnel ring
      if (!SynapseNetwork._glowTex) {
        const gSize = 128;
        const gCanvas = document.createElement('canvas');
        gCanvas.width = gSize; gCanvas.height = gSize;
        const gCtx = gCanvas.getContext('2d');
        const grad = gCtx.createRadialGradient(gSize/2, gSize/2, 0, gSize/2, gSize/2, gSize/2);
        grad.addColorStop(0, 'rgba(255,240,210,1)');
        grad.addColorStop(0.15, 'rgba(255,220,150,0.8)');
        grad.addColorStop(0.4, 'rgba(200,150,50,0.3)');
        grad.addColorStop(0.7, 'rgba(100,60,10,0.05)');
        grad.addColorStop(1, 'rgba(0,0,0,0)');
        gCtx.fillStyle = grad;
        gCtx.fillRect(0, 0, gSize, gSize);
        SynapseNetwork._glowTex = new THREE.CanvasTexture(gCanvas);
        SynapseNetwork._glowTex.needsUpdate = true;
      }

      const glowSpriteMat = new THREE.SpriteMaterial({
        map: SynapseNetwork._glowTex,
        color: new THREE.Color(colorHex),
        transparent: true,
        depthWrite: false,
        blending: THREE.AdditiveBlending,
      });
      const glowSprite = new THREE.Sprite(glowSpriteMat);
      const glowScale = radius * 8;
      glowSprite.scale.set(glowScale, glowScale, 1);
      glowSprite.name = `glow_${id}`;
      mesh.add(glowSprite);

      this._group.add(mesh);
      this._nodes.set(id, {
        id, position: position.clone(), mesh, glow: glowSprite,
        isCore, radius, _breathPhase: Math.random() * Math.PI * 2
      });
      return id;
    }

    connect(fromId, toId, options = {}) {
      const from = this._nodes.get(fromId);
      const to = this._nodes.get(toId);
      if (!from || !to) return;

      const { tubeRadius = 0.02, flowSpeed = 1.0 } = options;

      // Bezier curve with mid-point elevation
      const mid = new THREE.Vector3().addVectors(from.position, to.position).multiplyScalar(0.5);
      mid.y += from.position.distanceTo(to.position) * 0.3;
      const curve = new THREE.QuadraticBezierCurve3(from.position.clone(), mid, to.position.clone());

      // Tube pipeline — glowing gold
      const tubeGeo = new THREE.TubeGeometry(curve, 48, tubeRadius * 1.5, 8, false);
      const tubeMat = new THREE.MeshBasicMaterial({
        color: '#D4A843', transparent: true, opacity: 0.35, depthWrite: false,
        blending: THREE.AdditiveBlending,
      });
      const tube = new THREE.Mesh(tubeGeo, tubeMat);
      tube.name = `tube_${fromId}_${toId}`;
      this._group.add(tube);

      // Outer glow tube (thicker, more transparent)
      const glowTubeGeo = new THREE.TubeGeometry(curve, 48, tubeRadius * 4, 8, false);
      const glowTubeMat = new THREE.MeshBasicMaterial({
        color: '#D4A843', transparent: true, opacity: 0.08, depthWrite: false,
        blending: THREE.AdditiveBlending,
      });
      const glowTube = new THREE.Mesh(glowTubeGeo, glowTubeMat);
      glowTube.name = `glowtube_${fromId}_${toId}`;
      this._group.add(glowTube);

      // Flow particles along the curve — gold colored
      const flowCount = 100;
      const flowPositions = new Float32Array(flowCount * 3);
      const flowColors = new Float32Array(flowCount * 3);
      const flowSizes = new Float32Array(flowCount);

      for (let i = 0; i < flowCount; i++) {
        const t = i / flowCount;
        const pt = curve.getPointAt(t);
        flowPositions[i * 3] = pt.x;
        flowPositions[i * 3 + 1] = pt.y;
        flowPositions[i * 3 + 2] = pt.z;
        // Gold flow particles
        flowColors[i * 3] = 0.83;
        flowColors[i * 3 + 1] = 0.66;
        flowColors[i * 3 + 2] = 0.26;
        flowSizes[i] = 0.03;
      }

      const flowGeo = new THREE.BufferGeometry();
      flowGeo.setAttribute('position', new THREE.BufferAttribute(flowPositions, 3));
      flowGeo.setAttribute('aColor', new THREE.BufferAttribute(flowColors, 3));
      flowGeo.setAttribute('aSize', new THREE.BufferAttribute(flowSizes, 1));

      const flowMat = new THREE.ShaderMaterial({
        uniforms: { uPointScale: new THREE.Uniform(1.5) },
        vertexShader: ShaderLib.particleVS_color,
        fragmentShader: ShaderLib.particleFS,
        transparent: true, depthWrite: false, blending: THREE.AdditiveBlending,
      });

      const flowParticles = new THREE.Points(flowGeo, flowMat);
      flowParticles.name = `flow_${fromId}_${toId}`;
      this._group.add(flowParticles);

      this._edges.push({
        from: fromId, to: toId, tube, glowTube, particles: flowParticles, curve,
        flowSpeed, _pulsePhase: Math.random() * Math.PI * 2,
      });
    }

    setNodeActive(id, active) {
      const node = this._nodes.get(id);
      if (!node) return;
      const color = new THREE.Color(active ? '#D4A843' : '#B8942E');
      node.glow.material.color.set(color);
      node.mesh.material.color.set(color);
    }

    getNodeWorldPosition(id) {
      const node = this._nodes.get(id);
      if (!node) return null;
      const pos = new THREE.Vector3();
      node.mesh.getWorldPosition(pos);
      return pos;
    }

    update(delta, mousePos = null) {
      const t = performance.now() * 0.001;

      // Node breathing
      this._nodes.forEach((node) => {
        const breath = 1 + Math.sin(t * 2.0 + node._breathPhase) * 0.04;
        node.mesh.scale.setScalar(breath);
      });

      // Flow particles along curves
      this._edges.forEach((edge) => {
        const positions = edge.particles.geometry.attributes.position.array;
        for (let i = 0; i < positions.length / 3; i++) {
          let tVal = (i / (positions.length / 3) + t * edge.flowSpeed * 0.1) % 1;
          const pt = edge.curve.getPointAt(tVal);
          positions[i * 3] = pt.x;
          positions[i * 3 + 1] = pt.y;
          positions[i * 3 + 2] = pt.z;
        }
        edge.particles.geometry.attributes.position.needsUpdate = true;
      });
    }

    clear() {
      while (this._group.children.length > 0) {
        const child = this._group.children[0];
        if (child.geometry) child.geometry.dispose();
        if (child.material) {
          if (Array.isArray(child.material)) child.material.forEach(m => m.dispose());
          else child.material.dispose();
        }
        this._group.remove(child);
      }
      this._nodes.clear();
      this._edges = [];
    }

    dispose() {
      this.clear();
      this._scene.remove(this._group);
    }
  }

  // ===== Scene2_NeuralGallery — Project cards with synapse connections =====
  class Scene2_NeuralGallery {
    constructor(stage) {
      this._stage = stage;
      this._network = new SynapseNetwork(stage.scene);
      this._group = new THREE.Group();
      this._group.name = 'scene2_gallery';
      stage.scene.add(this._group);
      this._cards = [];
    }

    init(projects) {
      // Vertical spiral layout: 2 columns, 3 rows, wide Y spread
      const nodeIds = [];
      const cols = [-3.5, 3.5];
      const rows = [5, 0, -5];

      projects.forEach((proj, i) => {
        const col = cols[i % 2];
        const row = rows[Math.floor(i / 2)];
        const x = col + (Math.random() - 0.5) * 1.0;
        const yPos = row + (Math.random() - 0.5) * 1.0;
        const z = (Math.random() - 0.5) * 2;
        const pos = new THREE.Vector3(x, yPos, z);
        const nodeId = this._network.addNode(proj.id, pos, {
          radius: proj.star ? 0.4 : 0.25, isCore: proj.star
        });
        nodeIds.push(nodeId);

        // Project card
        const canvas = document.createElement('canvas');
        canvas.width = 512; canvas.height = 200;
        const ctx = canvas.getContext('2d');
        ctx.fillStyle = 'rgba(0,0,0,0.75)';
        ctx.beginPath(); ctx.roundRect(0, 0, 512, 200, 12); ctx.fill();
        ctx.strokeStyle = '#D4A843'; ctx.lineWidth = 2;
        ctx.beginPath(); ctx.roundRect(0, 0, 512, 200, 12); ctx.stroke();
        ctx.fillStyle = '#D4A843'; ctx.font = 'bold 24px Inter, PingFang SC, sans-serif';
        ctx.fillText(proj.name, 20, 45);
        ctx.fillStyle = '#AAAAAA'; ctx.font = '14px Inter, PingFang SC, sans-serif';
        let line = ''; let ly = 80;
        for (const char of proj.tagline) {
          if (ctx.measureText(line + char).width > 460 && line.length > 0) {
            ctx.fillText(line, 20, ly); ly += 22; line = char;
          } else { line += char; }
        }
        if (line) ctx.fillText(line, 20, ly);
        ctx.fillStyle = '#B8942E'; ctx.font = '12px monospace';
        ctx.fillText(proj.tech.join(' · '), 20, 175);

        const texture = new THREE.CanvasTexture(canvas);
        texture.minFilter = THREE.LinearFilter;
        const cardGeo = new THREE.PlaneGeometry(3, 1.17);
        const cardMat = new THREE.MeshBasicMaterial({ map: texture, transparent: true, depthWrite: false });
        const card = new THREE.Mesh(cardGeo, cardMat);
        card.position.copy(pos);
        card.position.x += col > 0 ? 2.5 : -2.5;
        card.position.y += 0.2;
        card.lookAt(new THREE.Vector3(pos.x, card.position.y, 10));
        card.name = `card_${proj.id}`;
        this._group.add(card);
        this._cards.push({ id: proj.id, card, nodeId });
      });

      // Vertical chain: connect top→middle→bottom within each column, plus cross-links
      for (let i = 0; i < nodeIds.length; i++) {
        for (let j = i + 1; j < nodeIds.length; j++) {
          const yi = this._network.getNodeWorldPosition(nodeIds[i]).y;
          const yj = this._network.getNodeWorldPosition(nodeIds[j]).y;
          const dy = Math.abs(yi - yj);
          // Connect if same column (vertical chain) or close Y (cross link)
          if (i % 2 === j % 2 || dy < 3) {
            this._network.connect(nodeIds[i], nodeIds[j], {
              tubeRadius: 0.015, flowSpeed: 0.3 + Math.random() * 0.4
            });
          }
        }
      }
    }

    update(delta, progress, mousePos) {
      this._network.update(delta, mousePos);
      // Highlight the "current" card based on progress
      const activeIdx = Math.floor(progress * this._cards.length);
      this._cards.forEach((c, i) => {
        this._network.setNodeActive(c.nodeId, i === activeIdx);
      });
    }

    onEnter() { this._group.visible = true; }
    onLeave() { this._group.visible = false; }
    dispose() {
      this._network.dispose();
      this._group.children.forEach(c => {
        if (c.material.map) c.material.map.dispose();
        c.material.dispose(); c.geometry.dispose();
      });
      this._stage.scene.remove(this._group);
    }
  }

  // ===== Scene3_SkillConstellation — Skills as node constellations =====
  class Scene3_SkillConstellation {
    constructor(stage) {
      this._stage = stage;
      this._network = new SynapseNetwork(stage.scene);
      this._group = new THREE.Group();
      this._group.name = 'scene3_constellation';
      this._rotationSpeed = 0.08;
      stage.scene.add(this._group);
    }

    init(skills) {
      // Center node
      this._network.addNode('vincent', new THREE.Vector3(0, 0, 0), { radius: 0.6, isCore: true });

      // Inner ring — core skills, spread vertically ±2
      const innerRadius = 3;
      skills.core.forEach((skill, i) => {
        const angle = (Math.PI * 2 / skills.core.length) * i;
        const yOff = (i < 2) ? 2 : -2;
        const pos = new THREE.Vector3(
          Math.cos(angle) * innerRadius,
          yOff + (Math.random() - 0.5) * 0.8,
          Math.sin(angle) * innerRadius
        );
        const nodeId = this._network.addNode(`core_${i}`, pos, { radius: 0.35, isCore: true });
        this._network.connect('vincent', nodeId, { tubeRadius: 0.025, flowSpeed: 1.2 });
        this._group.add(this._createLabel(skill.name, pos.clone().add(new THREE.Vector3(0, 0.6, 0)), false));
      });

      // Outer ring — auxiliary skills, spread vertically ±4
      const outerRadius = 6;
      skills.auxiliary.forEach((skill, i) => {
        const angle = (Math.PI * 2 / skills.auxiliary.length) * i + 0.2;
        const yOff = (i < 4) ? 3.5 : -3.5;
        const pos = new THREE.Vector3(
          Math.cos(angle) * outerRadius,
          yOff + (Math.random() - 0.5) * 1.0,
          Math.sin(angle) * outerRadius
        );
        const nodeId = this._network.addNode(`aux_${i}`, pos, { radius: 0.18, isCore: false });
        const nearestCoreIdx = i % skills.core.length;
        this._network.connect(`core_${nearestCoreIdx}`, nodeId, { tubeRadius: 0.01, flowSpeed: 0.4 });
        this._group.add(this._createLabel(skill.name, pos.clone().add(new THREE.Vector3(0, 0.35, 0)), true));
      });
    }

    _createLabel(text, position, isSmall) {
      const canvas = document.createElement('canvas');
      canvas.width = 256; canvas.height = 64;
      const ctx = canvas.getContext('2d');
      ctx.fillStyle = isSmall ? '#B8942E' : '#D4A843';
      ctx.font = `${isSmall ? 16 : 20}px Inter, PingFang SC, sans-serif`;
      ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      ctx.fillText(text, 128, 32);
      const texture = new THREE.CanvasTexture(canvas);
      texture.minFilter = THREE.LinearFilter;
      const spriteMat = new THREE.SpriteMaterial({ map: texture, transparent: true, depthWrite: false });
      const sprite = new THREE.Sprite(spriteMat);
      sprite.position.copy(position);
      sprite.scale.set(isSmall ? 2 : 3, isSmall ? 0.5 : 0.75, 1);
      return sprite;
    }

    update(delta, progress, mousePos) {
      this._group.rotation.y += this._rotationSpeed * delta;
      this._network.update(delta, mousePos);
    }

    onEnter() { this._group.visible = true; }
    onLeave() { this._group.visible = false; }
    dispose() {
      this._network.dispose();
      this._stage.scene.remove(this._group);
    }
  }

  // ===== CursorUI =====
  class CursorUI {
    constructor() {
      this._el = document.getElementById('cursor');
      this._state = 'default';
      document.addEventListener('mousemove', (e) => {
        this._el.style.transform = `translate(${e.clientX - 10}px, ${e.clientY - 10}px)`;
      });
    }

    setState(state) {
      this._state = state;
      this._el.className = `cursor cursor--${state}`;
      if (state === 'hover') {
        this._el.style.width = '40px';
        this._el.style.height = '40px';
      } else {
        this._el.style.width = '20px';
        this._el.style.height = '20px';

    update(mouseManager) {
      const speed = Math.sqrt(mouseManager.velocity.x ** 2 + mouseManager.velocity.y ** 2);
      const scale = 1 + speed * 2;
      const plus = this._el.querySelector('.cursor__plus');
      if (plus) plus.style.transform = `translate(-50%, -50%) scale(${scale})`;
    }

    dispose() {}
  }

    camCtrl.addKeyframe(0.62,  new THREE.Vector3(0, 4, 7),   new THREE.Vector3(0, 3, 0), 44);
    camCtrl.addKeyframe(0.75,  new THREE.Vector3(0, 0, 10),  new THREE.Vector3(0, 0, 0), 50);
    camCtrl.addKeyframe(1.0,   new THREE.Vector3(0, 0, 8),   new THREE.Vector3(0, 0, 0), 50);

    // Initialize scenes
    const scenes = [
      new Scene1_Hero(stage),
      new Scene2_NeuralGallery(stage),
      new Scene3_SkillConstellation(stage),
      new Scene4_About(stage),
    ];
    scenes[0].init();
    scenes[1].init(DataModel.projects);
    scenes[2].init(DataModel.skills);
    scenes[3].init(DataModel.personal);

    // Hide scenes 2-4 initially
    for (let i = 1; i < scenes.length; i++) scenes[i]._group.visible = false;

    // ===== Debug Scaffold =====
    const DEBUG = {
      _steps: [],
      _errors: [],
      log(step, detail) {
        const entry = { step, detail, time: performance.now().toFixed(1) };
        this._steps.push(entry);
        console.log(`[${entry.time}ms] ${step}`, detail || '');
      },
      err(step, e) {
        const entry = { step, error: e.message || e, stack: e.stack, time: performance.now().toFixed(1) };
        this._errors.push(entry);
        console.error(`[${entry.time}ms] ERROR @ ${step}:`, e);
      },
      dump() { console.table(this._steps); if (this._errors.length) console.table(this._errors); }
    };
    window.__DEBUG = DEBUG;

    DEBUG.log('bootstrap', '开始组装');

    // ===== GSAP ScrollTrigger =====
    document.body.style.height = '400vh';
    gsap.registerPlugin(ScrollTrigger);
    DEBUG.log('scrolltrigger', 'GSAP+ScrollTrigger 已注册');

    const scrollProxy = { progress: 0 };
    let prevSceneIdx = 0;
    let _frameCount = 0;

    try {
      gsap.to(scrollProxy, {
        progress: 1, ease: 'none',
        scrollTrigger: {
          trigger: document.body, start: 'top top', end: 'bottom bottom', scrub: 0.5,
        }
      });
      DEBUG.log('tween', 'GSAP tween + ScrollTrigger 已创建');
    } catch (e) { DEBUG.err('创建ScrollTrigger', e); }

    // ===== 持续 rAF 渲染循环 =====
    let _rafId;
    function _persistentLoop(ts) {
      _rafId = requestAnimationFrame(_persistentLoop);
      try {
        const delta = Math.min(stage.clock.getDelta(), 0.1);
        mouse.update();

        // 直接用 DOM 滚动位置算进度，不依赖 ScrollTrigger 内部状态
        const maxScroll = document.body.scrollHeight - window.innerHeight;
        const p = maxScroll > 0 ? Math.min(window.scrollY / maxScroll, 1) : 0;
        camCtrl.update(p);
        starfield.update(delta, camCtrl.getPosition());

        const sceneIdx = Math.min(Math.floor(p * 4), 3);
        const localP = Math.min((p - sceneIdx * 0.25) / 0.25, 1);

        scenes.forEach((s, i) => { s._group.visible = (i === sceneIdx); });
        if (sceneIdx !== prevSceneIdx) {
          DEBUG.log('scene', `${prevSceneIdx} → ${sceneIdx} @ ${(p*100).toFixed(1)}%`);
          prevSceneIdx = sceneIdx;
        }
        scenes[sceneIdx].update(delta, localP, mouse.normalized);
        cursorUI.update(mouse);
        stage.renderer.render(stage.scene, stage.camera);

        _frameCount++;
        if (_frameCount === 1) DEBUG.log('F1', `场景${sceneIdx} 进度${p.toFixed(3)} 相机z${camCtrl.getPosition().z.toFixed(1)} Δ${delta.toFixed(4)}`);
      } catch (e) {
        DEBUG.err('渲染循环', e);
        if (_frameCount > 60) { cancelAnimationFrame(_rafId); DEBUG.err('渲染停止', '连续错误>60帧'); }
      }
    }
    _persistentLoop(0);
    DEBUG.log('rAF', '渲染循环启动');

    // ===== Preloader =====
    try {
      const preloader = new Preloader(() => { DEBUG.log('preloader', '回调触发'); });
      preloader.start();
      DEBUG.log('preloader', '开场动画已启动');
      setTimeout(() => {
        try { preloader.complete(); DEBUG.log('preloader', '动画结束，遮罩已移除'); }
        catch (e) { DEBUG.err('preloader完成', e); }
      }, 1500);
    } catch (e) { DEBUG.err('创建Preloader', e); }

    window.__stage = stage;
    window.__scenes = scenes;
    DEBUG.log('ready', 'Neural Constellation 初始化完成 — 滚动以探索');
  });
  </script>
</body>
</html>
