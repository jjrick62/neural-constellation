  <!-- ===== 2. Shader 库 ===== -->
  <script>
  // ===== 2. Shader 库 =====
  const ShaderLib = {
    particleVS: `
      attribute float aSize;
      varying vec3 vColor;
      uniform float uPointScale;
      void main() {
        vec4 mvPosition = modelViewMatrix * vec4(position, 1.0);
        gl_PointSize = aSize * uPointScale * (300.0 / -mvPosition.z);
        gl_Position = projectionMatrix * mvPosition;
      }
    `,

    particleFS_color: `
      varying vec3 vColor;
      void main() {
        float d = length(gl_PointCoord - 0.5) * 2.0;
        float alpha = 1.0 - smoothstep(0.0, 1.0, d);
        alpha *= 0.8;
        gl_FragColor = vec4(vColor, alpha);
      }
    `,

    particleFS_white: `
      void main() {
        float d = length(gl_PointCoord - 0.5) * 2.0;
        float alpha = 1.0 - smoothstep(0.0, 1.0, d);
        alpha *= 0.9;
        gl_FragColor = vec4(1.0, 1.0, 1.0, alpha);
      }
    `,

    glowFS: `
      varying vec3 vNormal;
      uniform vec3 uColor;
      void main() {
        float intensity = pow(0.7 - dot(vNormal, vec3(0.0, 0.0, 1.0)), 2.0);
        gl_FragColor = vec4(uColor, intensity * 0.6);
      }
    `,
  };
  </script>

  <!-- ===== 5. 调度层 ===== -->
  <script type="module">
  // ===== 5. 调度层 =====
  import * as THREE from 'three';

  class Stage {
    constructor(containerId) {
      this._container = document.getElementById(containerId);
      this._width = window.innerWidth;
      this._height = window.innerHeight;

      this.renderer = new THREE.WebGLRenderer({ alpha: true, antialias: true });
      this.renderer.setSize(this._width, this._height);
      this.renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
      this.renderer.outputColorSpace = THREE.SRGBColorSpace;
      this.renderer.toneMapping = THREE.ACESFilmicToneMapping;
      this.renderer.toneMappingExposure = 1.2;
      this._container.appendChild(this.renderer.domElement);

      this.scene = new THREE.Scene();
      this.scene.background = new THREE.Color('#000000');

      this.camera = new THREE.PerspectiveCamera(45, this._width / this._height, 0.1, 100);
      this.camera.position.set(0, 0, 20);

      this.clock = new THREE.Clock();
      this._events = {};
      this._sceneIndex = 0;

      this._onResize = () => {
        this._width = window.innerWidth;
        this._height = window.innerHeight;
        this.renderer.setSize(this._width, this._height);
        this.camera.aspect = this._width / this._height;
        this.camera.updateProjectionMatrix();
        this.emit('resize', { width: this._width, height: this._height });
      };
      window.addEventListener('resize', this._onResize);
    }

    on(event, fn) { (this._events[event] ||= []).push(fn); }
    emit(event, data) { (this._events[event] || []).forEach(fn => fn(data)); }

    get currentSceneIndex() { return this._sceneIndex; }
  }

  // Quick smoke test
  const stage = new Stage('stage-container');
  console.log('Stage initialized:', stage.renderer.domElement);

  // Simple render loop for smoke test
  function smokeTest() {
    requestAnimationFrame(smokeTest);
    stage.renderer.render(stage.scene, stage.camera);
  }
  smokeTest();
  </script>
