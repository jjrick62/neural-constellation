  <!-- ===== 2. Shader 库 ===== -->
  <script>
  // ===== 2. Shader 库 =====
  const ShaderLib = {
    particleVS: `
      attribute float aSize;
      varying vec3 vColor;
      uniform float uPointScale;
      void main() {
        vec4 mvPosition = modelViewMatrix * vec4(position, 1.0);
        gl_PointSize = aSize * uPointScale * (300.0 / -mvPosition.z);
        gl_Position = projectionMatrix * mvPosition;
      }
    `,

    particleFS_color: `
      varying vec3 vColor;
      void main() {
        float d = length(gl_PointCoord - 0.5) * 2.0;
        float alpha = 1.0 - smoothstep(0.0, 1.0, d);
        alpha *= 0.8;
        gl_FragColor = vec4(vColor, alpha);
      }
    `,

    particleFS_white: `
      void main() {
        float d = length(gl_PointCoord - 0.5) * 2.0;
        float alpha = 1.0 - smoothstep(0.0, 1.0, d);
        alpha *= 0.9;
        gl_FragColor = vec4(1.0, 1.0, 1.0, alpha);
      }
    `,

    glowFS: `
      varying vec3 vNormal;
      uniform vec3 uColor;
      void main() {
        float intensity = pow(0.7 - dot(vNormal, vec3(0.0, 0.0, 1.0)), 2.0);
        gl_FragColor = vec4(uColor, intensity * 0.6);
      }
    `,
  };
  </script>

  <script type="module">
  // ===== 5. 调度层 =====
  import * as THREE from 'three';

  class Stage {
    constructor(containerId) {
      this._container = document.getElementById(containerId);
      this._width = window.innerWidth;
      this._height = window.innerHeight;

      this.renderer = new THREE.WebGLRenderer({ alpha: true, antialias: true });
      this.renderer.setSize(this._width, this._height);
      this.renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
      this.renderer.outputColorSpace = THREE.SRGBColorSpace;
      this.renderer.toneMapping = THREE.ACESFilmicToneMapping;
      this.renderer.toneMappingExposure = 1.2;
      this._container.appendChild(this.renderer.domElement);

      this.scene = new THREE.Scene();
      this.scene.background = new THREE.Color('#000000');

      this.camera = new THREE.PerspectiveCamera(45, this._width / this._height, 0.1, 100);
      this.camera.position.set(0, 0, 20);

      this.clock = new THREE.Clock();
      this._events = {};
      this._sceneIndex = 0;

      this._onResize = () => {
        this._width = window.innerWidth;
        this._height = window.innerHeight;
        this.renderer.setSize(this._width, this._height);
        this.camera.aspect = this._width / this._height;
        this.camera.updateProjectionMatrix();
        this.emit('resize', { width: this._width, height: this._height });
      };
      window.addEventListener('resize', this._onResize);
    }

    on(event, fn) { (this._events[event] ||= []).push(fn); }
    emit(event, data) { (this._events[event] || []).forEach(fn => fn(data)); }

    get currentSceneIndex() { return this._sceneIndex; }
  }

  // ===== MouseManager =====
  class MouseManager {
    constructor(canvas) {
      this._canvas = canvas;
      this.normalized = { x: 0, y: 0 };
      this.screen = { x: 0, y: 0 };
      this.velocity = { x: 0, y: 0 };
      this.ripple = { x: 0, y: 0, strength: 0 };
      this._prevX = 0;
      this._prevY = 0;

      this._onMove = (e) => {
        this.screen.x = e.clientX;
        this.screen.y = e.clientY;
        this.normalized.x = (e.clientX / window.innerWidth) * 2 - 1;
        this.normalized.y = -(e.clientY / window.innerHeight) * 2 + 1;
        this.ripple.x = this.normalized.x;
        this.ripple.y = this.normalized.y;
      };

      this._onLeave = () => {
        this.ripple.strength = 0;
      };

      window.addEventListener('mousemove', this._onMove, { passive: true });
      window.addEventListener('mouseleave', this._onLeave);
    }

    update() {
      this.velocity.x = this.normalized.x - this._prevX;
      this.velocity.y = this.normalized.y - this._prevY;
      this._prevX = this.normalized.x;
      this._prevY = this.normalized.y;
      const speed = Math.sqrt(this.velocity.x ** 2 + this.velocity.y ** 2);
      this.ripple.strength = Math.min(speed * 3, 1.0);
    }

    dispose() {
      window.removeEventListener('mousemove', this._onMove);
      window.removeEventListener('mouseleave', this._onLeave);
    }
  }

  // ===== CameraController =====
  class CameraController {
    constructor(camera) {
      this._camera = camera;
      this._keyframes = [];
      this._currentPos = new THREE.Vector3();
      this._currentLookAt = new THREE.Vector3();
      this._currentFov = 45;
    }

    addKeyframe(progress, position, lookAt, fov = 45) {
      this._keyframes.push({
        progress: THREE.MathUtils.clamp(progress, 0, 1),
        position: position.clone(),
        lookAt: lookAt.clone(),
        fov
      });
      this._keyframes.sort((a, b) => a.progress - b.progress);
    }

    update(scrollProgress) {
      const t = THREE.MathUtils.clamp(scrollProgress, 0, 1);
      let prev = this._keyframes[0];
      let next = this._keyframes[this._keyframes.length - 1];
      for (let i = 0; i < this._keyframes.length - 1; i++) {
        if (t >= this._keyframes[i].progress && t <= this._keyframes[i + 1].progress) {
          prev = this._keyframes[i];
          next = this._keyframes[i + 1];
          break;
        }
      }
      const range = next.progress - prev.progress;
      const localT = range > 0 ? (t - prev.progress) / range : 0;
      const ease = localT < 0.5 ? 2 * localT * localT : 1 - Math.pow(-2 * localT + 2, 2) / 2;
      this._currentPos.lerpVectors(prev.position, next.position, ease);
      this._currentLookAt.lerpVectors(prev.lookAt, next.lookAt, ease);
      this._currentFov = THREE.MathUtils.lerp(prev.fov, next.fov, ease);
      this._camera.position.copy(this._currentPos);
      this._camera.lookAt(this._currentLookAt);
      this._camera.fov = this._currentFov;
      this._camera.updateProjectionMatrix();
    }

    getPosition() { return this._camera.position.clone(); }
    getTarget() { return this._currentLookAt.clone(); }
  }

  // ===== StarfieldBackground =====
  class StarfieldBackground {
    constructor(scene, count = 1200000) {
      this._scene = scene;
      this._count = count;

      const positions = new Float32Array(count * 3);
      const sizes = new Float32Array(count);

      for (let i = 0; i < count; i++) {
        const r = 30 + Math.random() * 30;
        const theta = Math.random() * Math.PI * 2;
        const phi = Math.acos(2 * Math.random() - 1);
        positions[i * 3] = r * Math.sin(phi) * Math.cos(theta);
        positions[i * 3 + 1] = r * Math.sin(phi) * Math.sin(theta);
        positions[i * 3 + 2] = r * Math.cos(phi);
        sizes[i] = 0.02 + Math.random() * 0.06;
      }

      const geometry = new THREE.BufferGeometry();
      geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
      geometry.setAttribute('aSize', new THREE.BufferAttribute(sizes, 1));

      const material = new THREE.ShaderMaterial({
        uniforms: {
          uPointScale: new THREE.Uniform(1.0),
        },
        vertexShader: ShaderLib.particleVS,
        fragmentShader: ShaderLib.particleFS_white,
        transparent: true,
        depthWrite: false,
        blending: THREE.AdditiveBlending,
      });

      this._points = new THREE.Points(geometry, material);
      this._points.name = 'starfield';
      scene.add(this._points);
    }

    update(delta, cameraPos = null, mouseRipple = null) {
      // Simple rotation for now
      this._points.rotation.y += delta * 0.015;
      this._points.rotation.x += delta * 0.005;
    }

    dispose() {
      this._points.geometry.dispose();
      this._points.material.dispose();
      this._scene.remove(this._points);
    }
  }

  // ===== SynapseNetwork =====
  class SynapseNetwork {
    constructor(scene) {
      this._scene = scene;
      this._nodes = new Map();
      this._edges = [];
      this._group = new THREE.Group();
      this._group.name = 'synapseNetwork';
      scene.add(this._group);
    }

    addNode(id, position, options = {}) {
      const { radius = 0.3, isCore = false } = options;
      const colorHex = isCore ? '#D4A843' : '#B8942E';

      const geo = new THREE.IcosahedronGeometry(radius, 2);
      const mat = new THREE.MeshBasicMaterial({ color: colorHex });
      const mesh = new THREE.Mesh(geo, mat);
      mesh.position.copy(position);
      mesh.name = `node_${id}`;

      // Glow halo (outer transparent sphere)
      const glowGeo = new THREE.SphereGeometry(radius * 2.5, 16, 16);
      const glowMat = new THREE.ShaderMaterial({
        uniforms: { uColor: new THREE.Uniform(new THREE.Color(colorHex)) },
        vertexShader: `
          varying vec3 vNormal;
          varying vec3 vPosition;
          void main() {
            vNormal = normalize(normalMatrix * normal);
            vPosition = position;
            gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
          }
        `,
        fragmentShader: ShaderLib.glowFS,
        transparent: true,
        depthWrite: false,
        blending: THREE.AdditiveBlending,
      });
      const glowMesh = new THREE.Mesh(glowGeo, glowMat);
      glowMesh.name = `glow_${id}`;
      mesh.add(glowMesh);

      this._group.add(mesh);
      this._nodes.set(id, {
        id, position: position.clone(), mesh, glow: glowMesh,
        isCore, radius, _breathPhase: Math.random() * Math.PI * 2
      });
      return id;
    }

    connect(fromId, toId, options = {}) {
      const from = this._nodes.get(fromId);
      const to = this._nodes.get(toId);
      if (!from || !to) return;

      const { tubeRadius = 0.02, flowSpeed = 1.0 } = options;

      // Bezier curve with mid-point elevation
      const mid = new THREE.Vector3().addVectors(from.position, to.position).multiplyScalar(0.5);
      mid.y += from.position.distanceTo(to.position) * 0.3;
      const curve = new THREE.QuadraticBezierCurve3(from.position.clone(), mid, to.position.clone());

      // Tube pipeline
      const tubeGeo = new THREE.TubeGeometry(curve, 32, tubeRadius, 6, false);
      const tubeMat = new THREE.MeshBasicMaterial({
        color: '#8B6914', transparent: true, opacity: 0.15, depthWrite: false,
      });
      const tube = new THREE.Mesh(tubeGeo, tubeMat);
      tube.name = `tube_${fromId}_${toId}`;
      this._group.add(tube);

      // Flow particles along the curve
      const flowCount = 60;
      const flowPositions = new Float32Array(flowCount * 3);
      const flowSizes = new Float32Array(flowCount);

      for (let i = 0; i < flowCount; i++) {
        const t = i / flowCount;
        const pt = curve.getPointAt(t);
        flowPositions[i * 3] = pt.x;
        flowPositions[i * 3 + 1] = pt.y;
        flowPositions[i * 3 + 2] = pt.z;
        flowSizes[i] = 0.015;
      }

      const flowGeo = new THREE.BufferGeometry();
      flowGeo.setAttribute('position', new THREE.BufferAttribute(flowPositions, 3));
      flowGeo.setAttribute('aSize', new THREE.BufferAttribute(flowSizes, 1));

      const flowMat = new THREE.ShaderMaterial({
        uniforms: { uPointScale: new THREE.Uniform(1.5) },
        vertexShader: ShaderLib.particleVS,
        fragmentShader: ShaderLib.particleFS_white,
        transparent: true, depthWrite: false, blending: THREE.AdditiveBlending,
      });

      const flowParticles = new THREE.Points(flowGeo, flowMat);
      flowParticles.name = `flow_${fromId}_${toId}`;
      this._group.add(flowParticles);

      this._edges.push({
        from: fromId, to: toId, tube, particles: flowParticles, curve,
        flowSpeed, _pulsePhase: Math.random() * Math.PI * 2,
      });
    }

    setNodeActive(id, active) {
      const node = this._nodes.get(id);
      if (!node) return;
      const color = active ? '#D4A843' : '#B8942E';
      node.glow.material.uniforms.uColor.value.set(color);
      node.mesh.material.color.set(color);
    }

    getNodeWorldPosition(id) {
      const node = this._nodes.get(id);
      if (!node) return null;
      const pos = new THREE.Vector3();
      node.mesh.getWorldPosition(pos);
      return pos;
    }

    update(delta, mousePos = null) {
      const t = performance.now() * 0.001;

      // Node breathing
      this._nodes.forEach((node) => {
        const breath = 1 + Math.sin(t * 2.0 + node._breathPhase) * 0.05;
        node.mesh.scale.setScalar(breath);
        node.glow.scale.setScalar(1 / breath);
      });

      // Flow particles along curves
      this._edges.forEach((edge) => {
        const positions = edge.particles.geometry.attributes.position.array;
        for (let i = 0; i < positions.length / 3; i++) {
          let tVal = (i / (positions.length / 3) + t * edge.flowSpeed * 0.1) % 1;
          const pt = edge.curve.getPointAt(tVal);
          positions[i * 3] = pt.x;
          positions[i * 3 + 1] = pt.y;
          positions[i * 3 + 2] = pt.z;
        }
        edge.particles.geometry.attributes.position.needsUpdate = true;
      });
    }

    clear() {
      while (this._group.children.length > 0) {
        const child = this._group.children[0];
        if (child.geometry) child.geometry.dispose();
        if (child.material) {
          if (Array.isArray(child.material)) child.material.forEach(m => m.dispose());
          else child.material.dispose();
        }
        this._group.remove(child);
      }
      this._nodes.clear();
      this._edges = [];
    }

    dispose() {
      this.clear();
      this._scene.remove(this._group);
    }
  }

  // ===== Scene1_Hero — Hero landing with VINCENT text =====
  class Scene1_Hero {
    constructor(stage) {
      this._stage = stage;
      this._group = new THREE.Group();
      this._group.name = 'scene1_hero';
    }

    init() {
      // VINCENT text via Canvas Texture
      const canvas = document.createElement('canvas');
      canvas.width = 1024; canvas.height = 256;
      const ctx = canvas.getContext('2d');
      const gradient = ctx.createLinearGradient(0, 0, 1024, 0);
      gradient.addColorStop(0, '#D4A843'); gradient.addColorStop(0.5, '#B8942E'); gradient.addColorStop(1, '#8B6914');
      ctx.fillStyle = gradient;
      ctx.font = 'bold 100px Inter, PingFang SC, sans-serif';
      ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      ctx.fillText('VINCENT', 512, 128);
      const texture = new THREE.CanvasTexture(canvas);
      texture.minFilter = THREE.LinearFilter;

      const textGeo = new THREE.PlaneGeometry(8, 2);
      const textMat = new THREE.MeshBasicMaterial({ map: texture, transparent: true, depthWrite: false });
      const textMesh = new THREE.Mesh(textGeo, textMat);
      textMesh.position.set(0, 0, 0);
      textMesh.name = 'heroText';
      this._group.add(textMesh);

      // Subtitle
      const subCanvas = document.createElement('canvas');
      subCanvas.width = 1024; subCanvas.height = 64;
      const subCtx = subCanvas.getContext('2d');
      subCtx.fillStyle = '#B8942E';
      subCtx.font = '18px Inter, PingFang SC, sans-serif';
      subCtx.textAlign = 'center';
      subCtx.fillText('大数据管理与应用 · 创造数据与代码的静谧建筑', 512, 32);
      const subTexture = new THREE.CanvasTexture(subCanvas);
      subTexture.minFilter = THREE.LinearFilter;
      const subGeo = new THREE.PlaneGeometry(6, 0.4);
      const subMat = new THREE.MeshBasicMaterial({ map: subTexture, transparent: true, depthWrite: false });
      const subMesh = new THREE.Mesh(subGeo, subMat);
      subMesh.position.set(0, -1.5, 0);
      subMesh.name = 'heroSubtitle';
      this._group.add(subMesh);

      this._stage.scene.add(this._group);
    }

    update(delta, progress) {
      // Fade out on scroll
      const opacity = 1 - progress;
      this._group.children.forEach(c => { c.material.opacity = Math.max(0, opacity); });
    }

    onEnter() { this._group.visible = true; }
    onLeave() { this._group.visible = false; }
    dispose() {
      this._group.children.forEach(c => {
        if (c.material.map) c.material.map.dispose();
        c.material.dispose(); c.geometry.dispose();
      });
      this._stage.scene.remove(this._group);
    }
  }

  // ===== Scene2_NeuralGallery — Project cards with synapse connections =====
  class Scene2_NeuralGallery {
    constructor(stage) {
      this._stage = stage;
      this._network = new SynapseNetwork(stage.scene);
      this._group = new THREE.Group();
      this._group.name = 'scene2_gallery';
      stage.scene.add(this._group);
      this._cards = [];
    }

    init(projects) {
      const radius = 8;
      const arcSpan = Math.PI * 0.7;
      const nodeIds = [];

      projects.forEach((proj, i) => {
        const angle = -arcSpan / 2 + (arcSpan / (projects.length - 1)) * i;
        const x = Math.sin(angle) * radius;
        const z = Math.cos(angle) * radius - 4;
        const pos = new THREE.Vector3(x, (Math.random() - 0.5) * 1.5, z);
        const nodeId = this._network.addNode(proj.id, pos, {
          radius: proj.star ? 0.4 : 0.25, isCore: proj.star
        });
        nodeIds.push(nodeId);

        // Project card
        const canvas = document.createElement('canvas');
        canvas.width = 512; canvas.height = 200;
        const ctx = canvas.getContext('2d');
        ctx.fillStyle = 'rgba(0,0,0,0.75)';
        ctx.beginPath(); ctx.roundRect(0, 0, 512, 200, 12); ctx.fill();
        ctx.strokeStyle = '#D4A843'; ctx.lineWidth = 2;
        ctx.beginPath(); ctx.roundRect(0, 0, 512, 200, 12); ctx.stroke();
        ctx.fillStyle = '#D4A843'; ctx.font = 'bold 24px Inter, PingFang SC, sans-serif';
        ctx.fillText(proj.name, 20, 45);
        ctx.fillStyle = '#AAAAAA'; ctx.font = '14px Inter, PingFang SC, sans-serif';
        // Word wrap tagline
        const words = proj.tagline.split('');
        let line = ''; let y = 80;
        for (const char of proj.tagline) {
          if (ctx.measureText(line + char).width > 460 && line.length > 0) {
            ctx.fillText(line, 20, y); y += 22; line = char;
          } else { line += char; }
        }
        if (line) ctx.fillText(line, 20, y);
        ctx.fillStyle = '#B8942E'; ctx.font = '12px monospace';
        ctx.fillText(proj.tech.join(' · '), 20, 175);

        const texture = new THREE.CanvasTexture(canvas);
        texture.minFilter = THREE.LinearFilter;
        const cardGeo = new THREE.PlaneGeometry(3, 1.17);
        const cardMat = new THREE.MeshBasicMaterial({ map: texture, transparent: true, depthWrite: false });
        const card = new THREE.Mesh(cardGeo, cardMat);
        card.position.copy(pos);
        card.position.y += 0.9;
        card.lookAt(new THREE.Vector3(pos.x, card.position.y, pos.z + 10));
        card.name = `card_${proj.id}`;
        this._group.add(card);
        this._cards.push({ id: proj.id, card, nodeId });
      });

      // Full interconnect
      for (let i = 0; i < nodeIds.length; i++) {
        for (let j = i + 1; j < nodeIds.length; j++) {
          this._network.connect(nodeIds[i], nodeIds[j], {
            tubeRadius: 0.015, flowSpeed: 0.5 + Math.random()
          });
        }
      }
    }

    update(delta, progress, mousePos) {
      this._network.update(delta, mousePos);
      // Highlight the "current" card based on progress
      const activeIdx = Math.floor(progress * this._cards.length);
      this._cards.forEach((c, i) => {
        this._network.setNodeActive(c.nodeId, i === activeIdx);
      });
    }

    onEnter() { this._group.visible = true; }
    onLeave() { this._group.visible = false; }
    dispose() {
      this._network.dispose();
      this._group.children.forEach(c => {
        if (c.material.map) c.material.map.dispose();
        c.material.dispose(); c.geometry.dispose();
      });
      this._stage.scene.remove(this._group);
    }
  }

  // ===== Scene3_SkillConstellation — Skills as node constellations =====
  class Scene3_SkillConstellation {
    constructor(stage) {
      this._stage = stage;
      this._network = new SynapseNetwork(stage.scene);
      this._group = new THREE.Group();
      this._group.name = 'scene3_constellation';
      this._rotationSpeed = 0.08;
      stage.scene.add(this._group);
    }

    init(skills) {
      // Center node
      this._network.addNode('vincent', new THREE.Vector3(0, 0, 0), { radius: 0.6, isCore: true });

      // Inner ring — core skills
      const innerRadius = 3;
      skills.core.forEach((skill, i) => {
        const angle = (Math.PI * 2 / skills.core.length) * i;
        const pos = new THREE.Vector3(
          Math.cos(angle) * innerRadius,
          (Math.random() - 0.5) * 1.5,
          Math.sin(angle) * innerRadius
        );
        const nodeId = this._network.addNode(`core_${i}`, pos, { radius: 0.35, isCore: true });
        this._network.connect('vincent', nodeId, { tubeRadius: 0.025, flowSpeed: 1.2 });
        this._group.add(this._createLabel(skill.name, pos.clone().add(new THREE.Vector3(0, 0.5, 0)), false));
      });

      // Outer ring — auxiliary skills
      const outerRadius = 6;
      skills.auxiliary.forEach((skill, i) => {
        const angle = (Math.PI * 2 / skills.auxiliary.length) * i + 0.2;
        const pos = new THREE.Vector3(
          Math.cos(angle) * outerRadius,
          (Math.random() - 0.5) * 2.5,
          Math.sin(angle) * outerRadius
        );
        const nodeId = this._network.addNode(`aux_${i}`, pos, { radius: 0.18, isCore: false });
        const nearestCoreIdx = i % skills.core.length;
        this._network.connect(`core_${nearestCoreIdx}`, nodeId, { tubeRadius: 0.01, flowSpeed: 0.4 });
        this._group.add(this._createLabel(skill.name, pos.clone().add(new THREE.Vector3(0, 0.35, 0)), true));
      });
    }

    _createLabel(text, position, isSmall) {
      const canvas = document.createElement('canvas');
      canvas.width = 256; canvas.height = 64;
      const ctx = canvas.getContext('2d');
      ctx.fillStyle = isSmall ? '#B8942E' : '#D4A843';
      ctx.font = `${isSmall ? 16 : 20}px Inter, PingFang SC, sans-serif`;
      ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      ctx.fillText(text, 128, 32);
      const texture = new THREE.CanvasTexture(canvas);
      texture.minFilter = THREE.LinearFilter;
      const spriteMat = new THREE.SpriteMaterial({ map: texture, transparent: true, depthWrite: false });
      const sprite = new THREE.Sprite(spriteMat);
      sprite.position.copy(position);
      sprite.scale.set(isSmall ? 2 : 3, isSmall ? 0.5 : 0.75, 1);
      return sprite;
    }

    update(delta, progress, mousePos) {
      this._group.rotation.y += this._rotationSpeed * delta;
      this._network.update(delta, mousePos);
    }

    onEnter() { this._group.visible = true; }
    onLeave() { this._group.visible = false; }
    dispose() {
      this._network.dispose();
      this._stage.scene.remove(this._group);
    }
  }

  // ===== Scene4_About — Quote, name, and contact info =====
  class Scene4_About {
    constructor(stage) {
      this._stage = stage;
      this._group = new THREE.Group();
      this._group.name = 'scene4_about';
      stage.scene.add(this._group);
    }

    init(personalData) {
      // Quote
      const canvas = document.createElement('canvas');
      canvas.width = 1024; canvas.height = 128;
      const ctx = canvas.getContext('2d');
      ctx.fillStyle = '#D4A843';
      ctx.font = 'bold 32px Inter, PingFang SC, sans-serif';
      ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      ctx.fillText(personalData.quote, 512, 64);
      const texture = new THREE.CanvasTexture(canvas);
      texture.minFilter = THREE.LinearFilter;
      const quoteGeo = new THREE.PlaneGeometry(8, 1);
      const quoteMat = new THREE.MeshBasicMaterial({ map: texture, transparent: true, depthWrite: false });
      const quoteMesh = new THREE.Mesh(quoteGeo, quoteMat);
      quoteMesh.position.set(0, 0.5, 0);
      this._group.add(quoteMesh);

      // Name
      const nameCanvas = document.createElement('canvas');
      nameCanvas.width = 512; nameCanvas.height = 96;
      const nCtx = nameCanvas.getContext('2d');
      nCtx.fillStyle = '#FFFFFF';
      nCtx.font = 'bold 42px Inter, PingFang SC, sans-serif';
      nCtx.textAlign = 'center'; nCtx.textBaseline = 'middle';
      nCtx.fillText(`${personalData.nameCn} · ${personalData.nameEn}`, 256, 48);
      const nameTex = new THREE.CanvasTexture(nameCanvas);
      nameTex.minFilter = THREE.LinearFilter;
      const nameGeo = new THREE.PlaneGeometry(5, 1);
      const nameMat = new THREE.MeshBasicMaterial({ map: nameTex, transparent: true, depthWrite: false });
      const nameMesh = new THREE.Mesh(nameGeo, nameMat);
      nameMesh.position.set(0, 2, 0);
      this._group.add(nameMesh);

      // Contacts
      const contacts = [
        `QQ: ${personalData.email[0]}`,
        `Gmail: ${personalData.email[1]}`,
        `GitHub: ${personalData.github}`
      ];
      contacts.forEach((text, i) => {
        const label = this._createTextSprite(text, new THREE.Vector3(0, -1 - i * 0.8, 0));
        this._group.add(label);
      });
    }

    _createTextSprite(text, position) {
      const canvas = document.createElement('canvas');
      canvas.width = 512; canvas.height = 48;
      const ctx = canvas.getContext('2d');
      ctx.fillStyle = '#B8942E';
      ctx.font = '16px monospace';
      ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      ctx.fillText(text, 256, 24);
      const texture = new THREE.CanvasTexture(canvas);
      texture.minFilter = THREE.LinearFilter;
      const mat = new THREE.SpriteMaterial({ map: texture, transparent: true, depthWrite: false });
      const sprite = new THREE.Sprite(mat);
      sprite.position.copy(position);
      sprite.scale.set(4, 0.38, 1);
      return sprite;
    }

    update(delta, progress) {}
    onEnter() { this._group.visible = true; }
    onLeave() { this._group.visible = false; }
    dispose() {
      this._group.children.forEach(c => {
        if (c.material.map) c.material.map.dispose();
        c.material.dispose(); c.geometry && c.geometry.dispose();
      });
      this._stage.scene.remove(this._group);
    }
  }

  // ===== Smoke test — test all 4 scenes =====
  const stage = new Stage('stage-container');
  const starfield = new StarfieldBackground(stage.scene, 300000);
  const mouse = new MouseManager(stage.renderer.domElement);

  const scenes = [
    new Scene1_Hero(stage),
    new Scene2_NeuralGallery(stage),
    new Scene3_SkillConstellation(stage),
    new Scene4_About(stage),
  ];
  scenes[0].init();
  scenes[1].init(DataModel.projects);
  scenes[2].init(DataModel.skills);
  scenes[3].init(DataModel.personal);

  // Hide scenes 2-4 for now, show scene 1
  scenes[1]._group.visible = false;
  scenes[2]._group.visible = false;
  scenes[3]._group.visible = false;

  console.log('All 4 scenes initialized');
  console.log('Scene 1 visible, scenes 2-4 hidden. Check console.');

  // Cycle through scenes with keyboard
  window.addEventListener('keydown', (e) => {
    if (e.key >= '1' && e.key <= '4') {
      const idx = parseInt(e.key) - 1;
      scenes.forEach((s, i) => { s._group.visible = (i === idx); });
      console.log(`Showing scene ${idx + 1}`);
    }
  });

  function smokeTest() {
    requestAnimationFrame(smokeTest);
    const delta = stage.clock.getDelta();
    mouse.update();
    starfield.update(delta);
    scenes.forEach(s => s.update(delta, 0, mouse.normalized));
    stage.renderer.render(stage.scene, stage.camera);
  }
  smokeTest();
  </script>
